name: Validate MCP Registry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install
      - name: Validate Registry
        run: npm run test:registry
      - name: Check for Secrets
        run: npm run test:secrets
