<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Registry Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    <svg style="display: none;" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <symbol id="icon-registry" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" />
            <path d="M2 17L12 22L22 17" />
            <path d="M2 12L12 17L22 12" />
        </symbol>
        <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </symbol>
        <symbol id="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
        </symbol>
        <symbol id="icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </symbol>
    </svg>

    <div class="container">
        <header>
            <div class="header-content">
                <div class="title-wrapper">
                    <div class="icon-container">
                        <svg width="24" height="24" aria-hidden="true"><use href="#icon-registry"></use></svg>
                    </div>
                    <h1>MCP Registry</h1>
                </div>
                <p class="subtitle">Discover, browse, and connect to organization-approved Model Context Protocol servers.</p>
            </div>
            <div class="stats-card">
                <div class="stat">
                    <span class="stat-value" id="server-count">-</span>
                    <span class="stat-label">Verified Servers</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-value v01">v0.1</span>
                    <span class="stat-label">Registry Version</span>
                </div>
            </div>
        </header>

        <div class="search-container">
            <svg class="search-icon" width="20" height="20" aria-hidden="true"><use href="#icon-search"></use></svg>
            <input type="text" id="search-input" placeholder="Search servers by name, description, or package..." autocomplete="off">
        </div>

        <main id="server-grid" class="grid-container">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Syncing Registry...</p>
            </div>
        </main>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
